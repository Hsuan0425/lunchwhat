<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="午餐">
<meta name="theme-color" content="#f5efe6">
<title>午餐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Noto+Serif+TC:wght@400;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #f5efe6;
    --bg-card: #fbf6ec;
    --ink: #2a2520;
    --ink-soft: #6b5d4f;
    --ink-faint: #b0a28e;
    --accent: #b8542e;
    --line: #d9ccb0;
    --green: #5e7a4a;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Serif TC', 'Fraunces', Georgia, serif;
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
  }

  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background-image:
      radial-gradient(circle at 15% 5%, rgba(184, 84, 46, 0.05) 0%, transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(107, 93, 79, 0.04) 0%, transparent 50%);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3CfeColorMatrix values='0 0 0 0 0.16 0 0 0 0 0.14 0 0 0 0 0.12 0 0 0 0.03 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.5;
    z-index: 1;
    mix-blend-mode: multiply;
  }

  .app {
    position: relative;
    z-index: 2;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 24px 24px 100px;
  }

  /* Today card */
  .today-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    padding: 26px 22px;
    margin-bottom: 24px;
    position: relative;
    box-shadow: 0 1px 0 rgba(42, 37, 32, 0.04);
  }

  .today-card::before {
    content: "";
    position: absolute;
    top: -1px;
    left: 20px;
    right: 20px;
    height: 3px;
    background: repeating-linear-gradient(90deg, var(--accent) 0 6px, transparent 6px 12px);
    opacity: 0.3;
  }

  .date-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .date-main {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 38px;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 6px;
  }

  .date-sub {
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
  }

  .today-status {
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px dashed var(--line);
  }

  .today-status-empty {
    color: var(--ink-faint);
    font-style: italic;
    font-size: 14px;
  }

  .today-status-filled {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }

  .today-shop {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--accent);
    line-height: 1.2;
    flex: 1;
    min-width: 0;
    word-break: break-word;
  }

  .today-change {
    background: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
    cursor: pointer;
    padding: 4px 8px;
    border: 1px solid var(--line);
    flex-shrink: 0;
  }

  .today-change:active {
    background: var(--ink);
    color: var(--bg-card);
  }

  /* Nearby hero button */
  .nearby-hero {
    width: 100%;
    padding: 18px;
    margin-bottom: 24px;
    background: var(--ink);
    color: var(--bg-card);
    border: none;
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    letter-spacing: 0.15em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s;
  }

  .nearby-hero:active { transform: scale(0.98); }

  .nearby-hero::before {
    content: "";
    position: absolute;
    inset: 3px;
    border: 1px solid rgba(251, 246, 236, 0.2);
    pointer-events: none;
  }

  .nearby-hero .pin {
    display: inline-block;
    margin-right: 8px;
    font-size: 16px;
  }

  .nearby-hero.loading {
    opacity: 0.7;
    cursor: wait;
  }

  .nearby-hero.loading .pin {
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Section label */
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 14px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .section-label .zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    text-transform: none;
  }

  /* Nearby results */
  .nearby-results {
    margin-bottom: 24px;
  }

  .nearby-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    margin-bottom: 12px;
    padding: 8px 10px;
    background: var(--bg-card);
    border-left: 2px solid var(--green);
  }

  .nearby-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .nearby-btn {
    background: var(--bg-card);
    border: 1px solid var(--line);
    padding: 12px 14px;
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .nearby-btn:active {
    background: var(--ink);
    color: var(--bg-card);
    border-color: var(--ink);
  }

  .nearby-btn .distance {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    flex-shrink: 0;
  }

  .nearby-btn:active .distance {
    color: var(--bg-card);
    opacity: 0.7;
  }

  .nearby-empty {
    padding: 14px;
    background: var(--bg-card);
    border: 1px dashed var(--line);
    color: var(--ink-soft);
    font-size: 13px;
    font-style: italic;
    text-align: center;
  }

  .nearby-error {
    padding: 14px;
    background: #fef0eb;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 13px;
  }

  /* Shop grid */
  .shop-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }

  .shop-btn {
    background: var(--bg-card);
    border: 1px solid var(--line);
    padding: 16px 14px;
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    transition: transform 0.1s;
    position: relative;
    min-height: 56px;
    display: flex;
    align-items: center;
    line-height: 1.3;
  }

  .shop-btn:active {
    transform: scale(0.97);
    background: var(--ink);
    color: var(--bg-card);
    border-color: var(--ink);
  }

  .shop-btn .count {
    position: absolute;
    top: 6px;
    right: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
  }

  /* Custom input */
  .custom-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .custom-input-row input {
    flex: 1;
    padding: 14px;
    border: 1px solid var(--line);
    background: var(--bg-card);
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    -webkit-appearance: none;
    border-radius: 0;
  }

  .custom-input-row input:focus { border-color: var(--accent); }
  .custom-input-row input::placeholder { color: var(--ink-faint); font-style: italic; }

  .custom-input-row button {
    padding: 0 18px;
    background: var(--ink);
    color: var(--bg-card);
    border: none;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    letter-spacing: 0.15em;
    cursor: pointer;
  }

  .custom-input-row button:disabled {
    background: var(--line);
    color: var(--ink-faint);
  }

  /* History */
  .history-item {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px dashed var(--line);
  }

  .history-item:last-child { border-bottom: none; }

  .history-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    min-width: 72px;
    flex-shrink: 0;
  }

  .history-date .day {
    display: block;
    color: var(--ink-soft);
    font-weight: 600;
    font-size: 10px;
    margin-top: 2px;
  }

  .history-shop {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    flex: 1;
    word-break: break-word;
    line-height: 1.4;
  }

  .history-shop.today-mark { color: var(--accent); font-weight: 500; }

  .history-delete {
    background: none;
    border: none;
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    cursor: pointer;
    padding: 4px 6px;
    flex-shrink: 0;
    opacity: 0.6;
  }

  .history-delete:active { color: var(--accent); }

  .empty {
    text-align: center;
    padding: 30px 20px;
    color: var(--ink-faint);
  }

  .empty-mark {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 48px;
    color: var(--line);
    line-height: 1;
    margin-bottom: 10px;
  }

  .empty-text { font-size: 13px; letter-spacing: 0.1em; }

  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink);
    color: var(--bg-card);
    padding: 12px 22px;
    font-size: 14px;
    letter-spacing: 0.1em;
    z-index: 200;
    transition: transform 0.3s ease;
    pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .footer-link {
    text-align: center;
    padding: 20px 0 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  .footer-link button {
    background: none;
    border: none;
    color: var(--ink-soft);
    font-family: inherit;
    font-size: inherit;
    letter-spacing: inherit;
    cursor: pointer;
    text-transform: inherit;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(42, 37, 32, 0.5);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(2px);
  }

  .modal-backdrop.show { display: flex; }

  .modal {
    background: var(--bg);
    width: 100%;
    max-width: 480px;
    padding: 24px 24px calc(24px + env(safe-area-inset-bottom));
    border-radius: 16px 16px 0 0;
    animation: slideUp 0.25s ease;
    max-height: 80vh;
    overflow-y: auto;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 16px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .modal-actions button {
    flex: 1;
    padding: 14px;
    border: none;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    letter-spacing: 0.15em;
    cursor: pointer;
  }

  .btn-cancel {
    background: transparent;
    border: 1px solid var(--line) !important;
    color: var(--ink-soft);
  }

  .btn-danger {
    background: var(--accent);
    color: var(--bg-card);
  }
</style>
</head>
<body>
<div class="app">

  <!-- TODAY -->
  <div class="today-card">
    <div class="date-label" id="date-label">TODAY</div>
    <div class="date-main" id="date-main">—</div>
    <div class="date-sub" id="date-sub">—</div>
    <div class="today-status" id="today-status"></div>
  </div>

  <!-- NEARBY (hero) -->
  <button class="nearby-hero" id="btn-nearby">
    <span class="pin">◉</span>搜尋我附近的餐廳
  </button>

  <!-- NEARBY RESULTS -->
  <div class="nearby-results" id="nearby-results"></div>

  <!-- QUICK SHOPS -->
  <div id="quick-section">
    <div class="section-label">
      <span>Recent Spots <span class="zh">· 常去</span></span>
    </div>
    <div class="shop-grid" id="shop-grid"></div>
  </div>

  <!-- CUSTOM INPUT -->
  <div class="section-label">
    <span>Write In <span class="zh">· 手動輸入</span></span>
  </div>
  <div class="custom-input-row">
    <input type="text" id="custom-input" placeholder="輸入店名..." autocomplete="off">
    <button id="btn-custom">記 錄</button>
  </div>

  <!-- HISTORY -->
  <div class="section-label">
    <span>Log <span class="zh">· 最近紀錄</span></span>
    <span class="zh" style="font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;" id="history-count"></span>
  </div>
  <div id="history-list"></div>
  <div class="footer-link" id="footer-link"></div>

</div>

<div class="modal-backdrop" id="modal-confirm">
  <div class="modal">
    <h3 class="modal-title" id="modal-confirm-title">確認?</h3>
    <p id="modal-confirm-text" style="color:var(--ink-soft); margin:0;"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-confirm')">取消</button>
      <button class="btn-danger" id="modal-confirm-yes">確定</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-all">
  <div class="modal">
    <h3 class="modal-title">全部紀錄</h3>
    <div id="modal-all-list"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-all')" style="flex:1;">關閉</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'lunch_simple_v2';

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { records: [] };
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadData();

  // ========== Utils ==========
  function todayISO() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function formatDateMono(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return (d.getMonth() + 1) + '月' + d.getDate() + '日';
  }

  function formatDateShort(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return String(d.getMonth() + 1).padStart(2, '0') + '.' + String(d.getDate()).padStart(2, '0');
  }

  function formatDateFull(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.getFullYear() + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + String(d.getDate()).padStart(2, '0');
  }

  function dayShort(dateStr) {
    const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
    return days[new Date(dateStr + 'T00:00:00').getDay()];
  }

  function dayZh(dateStr) {
    const days = ['日', '一', '二', '三', '四', '五', '六'];
    return '星期' + days[new Date(dateStr + 'T00:00:00').getDay()];
  }

  function daysAgo(dateStr) {
    const today = new Date(todayISO() + 'T00:00:00');
    const target = new Date(dateStr + 'T00:00:00');
    return Math.round((today - target) / (1000 * 60 * 60 * 24));
  }

  function relativeDay(dateStr) {
    const n = daysAgo(dateStr);
    if (n === 0) return '今天';
    if (n === 1) return '昨天';
    if (n === 2) return '前天';
    if (n < 7) return n + ' 天前';
    return formatDateShort(dateStr);
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function showToast(text) {
    const t = document.getElementById('toast');
    t.textContent = text;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1600);
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('show');
  }
  window.closeModal = closeModal;

  // ========== Record ==========
  function getTodayRecord() {
    return state.records.find(r => r.date === todayISO());
  }

  function recordLunch(shop) {
    const today = todayISO();
    shop = shop.trim();
    if (!shop) return;

    const existing = getTodayRecord();
    if (existing) {
      existing.shop = shop;
      existing.updatedAt = Date.now();
      showToast('已更新今天的午餐');
    } else {
      state.records.push({
        id: uid(),
        date: today,
        shop: shop,
        createdAt: Date.now(),
      });
      showToast('✓ 已記下');
    }
    saveData();
    renderAll();

    // Auto-scroll to top to see result
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  window.recordLunch = recordLunch;

  function renderToday() {
    const today = todayISO();
    document.getElementById('date-main').textContent = formatDateMono(today);
    document.getElementById('date-sub').textContent = dayZh(today) + ' · ' + dayShort(today);

    const record = getTodayRecord();
    const status = document.getElementById('today-status');
    if (record) {
      status.innerHTML =
        '<div class="today-status-filled">' +
        '<div class="today-shop">' + escapeHtml(record.shop) + '</div>' +
        '<button class="today-change" onclick="clearToday()">重新記錄</button>' +
        '</div>';
    } else {
      status.innerHTML = '<div class="today-status-empty">今天還沒記 · 選一間或輸入新的店家</div>';
    }
  }

  window.clearToday = function() {
    state.records = state.records.filter(r => r.date !== todayISO());
    saveData();
    renderAll();
    showToast('已清除');
  };

  function getShopFrequency() {
    const freq = {};
    const lastUsed = {};
    state.records.forEach(r => {
      freq[r.shop] = (freq[r.shop] || 0) + 1;
      lastUsed[r.shop] = Math.max(lastUsed[r.shop] || 0, new Date(r.date + 'T00:00:00').getTime());
    });
    return Object.entries(freq).map(([shop, count]) => ({
      shop, count, lastUsed: lastUsed[shop],
    })).sort((a, b) => {
      if (b.count !== a.count) return b.count - a.count;
      return b.lastUsed - a.lastUsed;
    });
  }

  function renderShops() {
    const grid = document.getElementById('shop-grid');
    const section = document.getElementById('quick-section');
    const shops = getShopFrequency().slice(0, 8);

    if (shops.length === 0) {
      section.style.display = 'none';
      return;
    }
    section.style.display = 'block';

    grid.innerHTML = shops.map(s =>
      '<button class="shop-btn" onclick="recordLunch(' + JSON.stringify(s.shop).replace(/"/g, '&quot;') + ')">' +
      (s.count > 1 ? '<span class="count">×' + s.count + '</span>' : '') +
      escapeHtml(s.shop) +
      '</button>'
    ).join('');
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    const countEl = document.getElementById('history-count');
    const footerLink = document.getElementById('footer-link');

    const today = todayISO();
    const sorted = [...state.records].sort((a, b) => b.date.localeCompare(a.date));

    countEl.textContent = sorted.length > 0 ? '共 ' + sorted.length + ' 筆' : '';

    if (sorted.length === 0) {
      list.innerHTML = '<div class="empty"><div class="empty-mark">~</div><div class="empty-text">還沒有紀錄</div></div>';
      footerLink.innerHTML = '';
      return;
    }

    const recent = sorted.slice(0, 10);
    list.innerHTML = recent.map(r =>
      '<div class="history-item">' +
      '<div class="history-date">' + relativeDay(r.date) + '<span class="day">' + dayShort(r.date) + '</span></div>' +
      '<div class="history-shop ' + (r.date === today ? 'today-mark' : '') + '">' + escapeHtml(r.shop) + '</div>' +
      '<button class="history-delete" onclick="confirmDelete(\'' + r.id + '\')">刪除</button>' +
      '</div>'
    ).join('');

    if (sorted.length > 10) {
      footerLink.innerHTML = '<button onclick="showAllHistory()">查看全部 ' + sorted.length + ' 筆 →</button>';
    } else {
      footerLink.innerHTML = '<span style="color:var(--ink-faint);">· 以上為全部紀錄 ·</span>';
    }
  }

  window.confirmDelete = function(id) {
    const r = state.records.find(x => x.id === id);
    if (!r) return;
    document.getElementById('modal-confirm-title').textContent = '刪除這筆紀錄?';
    document.getElementById('modal-confirm-text').textContent = formatDateFull(r.date) + ' · ' + r.shop;
    document.getElementById('modal-confirm').classList.add('show');
    document.getElementById('modal-confirm-yes').onclick = () => {
      state.records = state.records.filter(x => x.id !== id);
      saveData();
      renderAll();
      closeModal('modal-confirm');
      showToast('已刪除');
    };
  };

  window.showAllHistory = function() {
    const sorted = [...state.records].sort((a, b) => b.date.localeCompare(a.date));
    const today = todayISO();
    document.getElementById('modal-all-list').innerHTML = sorted.map(r =>
      '<div class="history-item">' +
      '<div class="history-date">' + formatDateShort(r.date) + '<span class="day">' + dayShort(r.date) + '</span></div>' +
      '<div class="history-shop ' + (r.date === today ? 'today-mark' : '') + '">' + escapeHtml(r.shop) + '</div>' +
      '<button class="history-delete" onclick="confirmDelete(\'' + r.id + '\')">刪除</button>' +
      '</div>'
    ).join('');
    document.getElementById('modal-all').classList.add('show');
  };

  // ========== Nearby restaurants (OSM Overpass API) ==========
  const btnNearby = document.getElementById('btn-nearby');
  const nearbyResults = document.getElementById('nearby-results');

  function haversineDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000; // meters
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2) ** 2 +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
              Math.sin(dLon/2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }

  function formatDistance(m) {
    if (m < 1000) return Math.round(m) + 'm';
    return (m / 1000).toFixed(1) + 'km';
  }

  async function fetchNearbyRestaurants(lat, lon) {
    // Overpass QL query: restaurants, fast_food, cafe within 200m
    const radius = 200;
    const query = `
      [out:json][timeout:10];
      (
        node["amenity"~"restaurant|fast_food|cafe|food_court"](around:${radius},${lat},${lon});
        way["amenity"~"restaurant|fast_food|cafe|food_court"](around:${radius},${lat},${lon});
      );
      out center tags 30;
    `;

    const url = 'https://overpass-api.de/api/interpreter';
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'data=' + encodeURIComponent(query),
    });

    if (!resp.ok) throw new Error('API 回應失敗');
    const data = await resp.json();

    return (data.elements || []).map(el => {
      const t = el.tags || {};
      const name = t['name:zh-Hant'] || t['name:zh'] || t.name || '(未命名店家)';
      const elLat = el.lat || (el.center && el.center.lat);
      const elLon = el.lon || (el.center && el.center.lon);
      const dist = (elLat && elLon) ? haversineDistance(lat, lon, elLat, elLon) : null;
      return { name, dist };
    }).filter(x => x.name !== '(未命名店家)')
      .sort((a, b) => (a.dist || 0) - (b.dist || 0));
  }

  function getPosition() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject(new Error('這個瀏覽器不支援定位功能'));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        pos => resolve(pos),
        err => {
          let msg = '無法取得位置';
          if (err.code === 1) msg = '位置權限被拒絕,請到設定 → Safari → 位置 允許';
          if (err.code === 2) msg = '目前無法取得位置(訊號不佳?)';
          if (err.code === 3) msg = '定位超時,請再試一次';
          reject(new Error(msg));
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 60000 }
      );
    });
  }

  // Check URL params for location passed from Shortcuts
  function getLocationFromURL() {
    const params = new URLSearchParams(window.location.search);
    const lat = parseFloat(params.get('lat'));
    const lon = parseFloat(params.get('lon'));
    if (!isNaN(lat) && !isNaN(lon)) return { lat, lon, fromShortcut: true };
    return null;
  }

  async function searchNearby(forcedLocation) {
    btnNearby.classList.add('loading');
    btnNearby.innerHTML = '<span class="pin">◉</span>搜尋中...';
    nearbyResults.innerHTML = '';

    try {
      let lat, lon, source;
      if (forcedLocation) {
        lat = forcedLocation.lat;
        lon = forcedLocation.lon;
        source = forcedLocation.fromShortcut ? '來自捷徑' : '指定位置';
      } else {
        const pos = await getPosition();
        lat = pos.coords.latitude;
        lon = pos.coords.longitude;
        source = '目前位置';
      }

      const results = await fetchNearbyRestaurants(lat, lon);

      let html = '<div class="nearby-meta">◉ ' + source + ' · 半徑 200m · 找到 ' + results.length + ' 間</div>';

      if (results.length === 0) {
        html += '<div class="nearby-empty">附近沒找到餐廳(可能地圖資料不完整),請手動輸入</div>';
      } else {
        html += '<div class="nearby-grid">';
        results.slice(0, 15).forEach(r => {
          const safeName = JSON.stringify(r.name).replace(/"/g, '&quot;');
          html += '<button class="nearby-btn" onclick="recordLunch(' + safeName + ')">';
          html += '<span>' + escapeHtml(r.name) + '</span>';
          if (r.dist !== null) html += '<span class="distance">' + formatDistance(r.dist) + '</span>';
          html += '</button>';
        });
        html += '</div>';
      }

      nearbyResults.innerHTML = html;
    } catch (err) {
      nearbyResults.innerHTML = '<div class="nearby-error">⚠ ' + escapeHtml(err.message) + '</div>';
    } finally {
      btnNearby.classList.remove('loading');
      btnNearby.innerHTML = '<span class="pin">◉</span>搜尋我附近的餐廳';
    }
  }

  btnNearby.addEventListener('click', () => searchNearby());

  // ========== Custom input ==========
  const customInput = document.getElementById('custom-input');
  const btnCustom = document.getElementById('btn-custom');

  function updateBtnState() {
    btnCustom.disabled = !customInput.value.trim();
  }

  customInput.addEventListener('input', updateBtnState);
  customInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && customInput.value.trim()) submitCustom();
  });

  function submitCustom() {
    const val = customInput.value.trim();
    if (!val) return;
    recordLunch(val);
    customInput.value = '';
    customInput.blur();
    updateBtnState();
  }

  btnCustom.addEventListener('click', submitCustom);
  updateBtnState();

  document.querySelectorAll('.modal-backdrop').forEach(bd => {
    bd.addEventListener('click', (e) => {
      if (e.target === bd) bd.classList.remove('show');
    });
  });

  function renderAll() {
    renderToday();
    renderShops();
    renderHistory();
  }

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) renderAll();
  });

  renderAll();

  // If URL contains location params (from Shortcuts), auto-search
  const urlLoc = getLocationFromURL();
  if (urlLoc) {
    setTimeout(() => searchNearby(urlLoc), 300);
    // Clean URL so it doesn't re-trigger on refresh
    if (window.history.replaceState) {
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  }
</script>
</body>
</html>
